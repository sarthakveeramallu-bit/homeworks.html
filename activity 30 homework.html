<!DOCTYPE html>
<html>
<body>
<p>Sum of arguments and Math objects </p>
<p id="demo"></p>
<script>
    function sum() {
        var i;
        var sum = 0;

        for (i = 0; i < arguments.length; i++) {
            sum += arguments[i];
        }
        return sum;
    }

    document.getElementById("demo").innerHTML = "The sum of the numbers is: " + sum(1, 123, 500, 115, 44, 88);
</script>
</body>
</html>
