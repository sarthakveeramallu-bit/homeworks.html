<!DOCTYPE html>
<html>
  <head>
    </head>

  <body>
    <button onclick="multiply(10,2)">Click Me!</button>
    <p id="result"></p>

    <script>
function multiply(a,b)
{
    if (a === 10)
    {
        b = 2;
    }
    var result = a * b;
}

document.getElementById("result").innerHTML = result;

    </script>

    </body>
</html>
